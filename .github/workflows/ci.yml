name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-ui:
    name: UI Tests (SauceDemo)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run UI tests
        run: npm run test:ui

      - name: Upload UI Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-ui
          path: playwright-report/
          retention-days: 14

      - name: Upload UI Monocart report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: monocart-report-ui
          path: monocart-report/
          retention-days: 14

      - name: Send UI test report email
        uses: dawidd6/action-send-mail@v3
        if: always()
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "${{ job.status == 'success' && '✅' || '❌' }} UI Tests – ${{ github.repository }}"
          to: kaashenchandra@gmail.com
          from: ${{ secrets.MAIL_USERNAME }}
          body: |
            Job: UI Tests (SauceDemo)
            Status: ${{ job.status }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          attachments: monocart-report/index.html

  test-api:
    name: API Tests (Restful-Booker)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run API tests
        run: npm run test:api

      - name: Generate snapshots
        if: failure()
        run: npx playwright test tests/api/ --update-snapshots

      - name: Commit snapshots
        if: failure()
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add tests/**-snapshots/
          git diff --staged --quiet || git commit -m "chore: update playwright snapshots"
          git push

      - name: Upload API Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-api
          path: playwright-report/
          retention-days: 14

      - name: Upload API Monocart report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: monocart-report-api
          path: monocart-report/
          retention-days: 14

      - name: Send API test report email
        uses: dawidd6/action-send-mail@v3
        if: always()
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "${{ job.status == 'success' && '✅' || '❌' }} API Tests – ${{ github.repository }}"
          to: kaashenchandra@gmail.com
          from: ${{ secrets.MAIL_USERNAME }}
          body: |
            Job: API Tests (Restful-Booker)
            Status: ${{ job.status }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          attachments: monocart-report/index.html