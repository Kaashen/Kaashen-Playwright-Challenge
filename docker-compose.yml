version: '3.8'

services:
  playwright:
    image: mcr.microsoft.com/playwright:v1.61.0-noble
    working_dir: /app
    volumes:
      - .:/app
    command: >
      sh -c "npm ci &&
             npx playwright test --config=playwright.docker.config.js --update-snapshots"
    environment:
      - CI=true