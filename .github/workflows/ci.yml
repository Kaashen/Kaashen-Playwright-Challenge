name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-ui:
    name: UI Tests (SauceDemo)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run UI tests
        run: npm run test:ui

      - name: Upload UI Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-ui
          path: playwright-report/
          retention-days: 14

      - name: Upload UI Monocart report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: monocart-report-ui
          path: monocart-report/
          retention-days: 14

      - name: Send email report
        uses: dawidd6/action-send-mail@v3
        if: always()
        with:
          server_address: smtp.office365.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "${{ job.status == 'success' && '✅' || '❌' }} Playwright ${{ job.status == 'success' && 'Passed' || 'Failed' }} - ${{ github.job }}"
          to: kaashenchandra@gmail.com
          from: ${{ secrets.MAIL_USERNAME }}
          body: |
            Job: ${{ github.job }}
            Status: ${{ job.status }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Download reports from the Actions run link above.

  test-api:
    name: API Tests (Restful-Booker)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run API tests
        run: npm run test:api

      - name: Upload API Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-api
          path: playwright-report/
          retention-days: 14

      - name: Upload API Monocart report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: monocart-report-api
          path: monocart-report/
          retention-days: 14

      - name: Send email report
        uses: dawidd6/action-send-mail@v3
        if: always()
        with:
          server_address: smtp.office365.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "${{ job.status == 'success' && '✅' || '❌' }} Playwright ${{ job.status == 'success' && 'Passed' || 'Failed' }} - ${{ github.job }}"
          to: kaashenchandra@gmail.com
          from: ${{ secrets.MAIL_USERNAME }}
          body: |
            Job: ${{ github.job }}
            Status: ${{ job.status }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Download reports from the Actions run link above.