name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-ui:
    name: UI Tests (SauceDemo)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run UI tests
        run: npm run test:ui

      - name: Upload UI Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-ui
          path: playwright-report/
          retention-days: 14

      - name: Upload UI Monocart report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: monocart-report-ui
          path: monocart-report/
          retention-days: 14

  test-api:
    name: API Tests (Restful-Booker)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run API tests
        run: npm run test:api

      - name: Generate snapshots
        if: failure()
        run: npx playwright test tests/api/ --update-snapshots

      - name: Commit snapshots
        if: failure()
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add tests/**-snapshots/
          git diff --staged --quiet || git commit -m "chore: update playwright snapshots"
          git push

      - name: Upload API Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-api
          path: playwright-report/
          retention-days: 14

      - name: Upload API Monocart report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: monocart-report-api
          path: monocart-report/
          retention-days: 14

  notify:
    name: Send Test Reports
    runs-on: ubuntu-latest
    needs: [test-ui, test-api]
    if: always()

    steps:
      - name: Download UI Playwright report
        uses: actions/download-artifact@v4
        with:
          name: playwright-report-ui
          path: reports/playwright-ui/

      - name: Download UI Monocart report
        uses: actions/download-artifact@v4
        with:
          name: monocart-report-ui
          path: reports/monocart-ui/

      - name: Download API Playwright report
        uses: actions/download-artifact@v4
        with:
          name: playwright-report-api
          path: reports/playwright-api/

      - name: Download API Monocart report
        uses: actions/download-artifact@v4
        with:
          name: monocart-report-api
          path: reports/monocart-api/

      - name: Send combined test report email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "🎭 Playwright Test Reports – ${{ github.repository }}"
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_USERNAME }}
          body: |
            UI Tests:  ${{ needs.test-ui.result }}
            API Tests: ${{ needs.test-api.result }}

            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          attachments: >-
            reports/playwright-ui/index.html,
            reports/monocart-ui/index.html,
            reports/playwright-api/index.html,
            reports/monocart-api/index.html